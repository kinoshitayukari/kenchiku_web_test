<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>バスルーム改修チェックリスト</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  </head>
  <body>
    <main class="container">
      <article>
        <header>
          <h1>バスルーム改修チェックリスト</h1>
          <p>公開日: 2024年5月27日</p>
        </header>
        <p>
          浴室リフォームは、断熱・防水・換気など専門的な視点が求められる工事です。着工前に確認したいポイントをチェックリスト形式でまとめました。
        </p>
        <h2>事前に確認すること</h2>
        <ul>
          <li>既存の給排水管の位置と劣化状況</li>
          <li>ユニットバス・在来工法のどちらを採用するか</li>
          <li>ヒートショック対策のための断熱・暖房設備</li>
          <li>バリアフリー対応の必要性</li>
        </ul>
        <h2>工事中のチェックポイント</h2>
        <p>
          配管の更新や防水工事が適切に行われているかを現場で確認しましょう。疑問点はその場で解決することが大切です。
        </p>
        <footer>
          <p>監修: 水回り設備プランナー 佐藤</p>
        </footer>
      </article>
    </main>
  </body>
</html>
